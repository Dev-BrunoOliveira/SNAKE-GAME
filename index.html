<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
</style>
    <title>Retro Games</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="/img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
    <link rel="shortcut icon" href="/img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
    <link rel="manifest" href="/img/site.webmanifest" />
  </head>
  <body>
    <h1>Retro Games</h1>
    <div id="main-menu" class="menu-container">
      <h2>Escolha o Jogo</h2>
      <div class="menu-btn-wrapper">
        <button id="btn-snake">Snake</button>
        <div class="high-score">Recorde: <span id="hs-snake">0</span></div>
      </div>
      <div class="menu-btn-wrapper">
        <button id="btn-tetris">Tetris</button>
        <div class="high-score">Recorde: <span id="hs-tetris">0</span></div>
      </div>
      <div class="menu-btn-wrapper">
        <button id="btn-asteroids">Asteroids</button>
        <div class="high-score">Recorde: <span id="hs-asteroids">0</span></div>
      </div>
      <div class="menu-btn-wrapper">
        <button id="btn-pong">Pong</button>
        <div class="high-score">Recorde: <span id="hs-pong">0</span></div>
      </div>
      <div class="menu-btn-wrapper">
        <button id="btn-space-invaders">Space Invaders</button>
        <div class="high-score">Recorde: <span id="hs-space-invaders">0</span></div>
      </div>
    </div>

    <div id="game-container" class="hidden">
      <div class="score-container">
        <span>Pontuação: </span>
        <span id="score">0</span>
      </div>
      <div class="board-wrapper">
        <canvas id="game-board" width="400" height="400"></canvas>
        <div class="scanlines"></div>
      </div>
      <div class="controls">
        <button id="start-button">Iniciar Jogo</button>
        <button id="menu-button">Menu</button>
      </div>
      <div id="desktop-instructions" class="instructions-text"></div>
    </div>

    <div id="mobile-controls" class="hidden">
      <!-- Snake Controls (Default) -->
      <div id="controls-snake" class="controls-group">
        <button id="up-button">↑</button>
        <div>
          <button id="left-button">←</button>
          <button id="down-button">↓</button>
          <button id="right-button">→</button>
        </div>
      </div>
      
      <!-- Tetris Controls -->
      <div id="controls-tetris" class="controls-group hidden">
        <button id="tetris-up-button">↻</button>
        <div>
          <button id="tetris-left-button">←</button>
          <button id="tetris-down-button">↓</button>
          <button id="tetris-right-button">→</button>
        </div>
        <button id="tetris-space-button" style="width: 120px; font-size: 1.2em;">DROP</button>
      </div>

      <!-- Asteroids Controls -->
      <div id="controls-asteroids" class="controls-group hidden">
        <button id="ast-up-button">🚀</button>
        <div>
          <button id="ast-left-button">↺</button>
          <button id="ast-space-button">🔥</button>
          <button id="ast-right-button">↻</button>
        </div>
      </div>

      <!-- Pong Controls -->
      <div id="controls-pong" class="controls-group hidden">
        <button id="pong-up-button">↑</button>
        <div>
          <button id="pong-down-button">↓</button>
        </div>
      </div>

      <!-- Space Invaders Controls -->
      <div id="controls-space-invaders" class="controls-group hidden">
        <div>
          <button id="si-left-button">←</button>
          <button id="si-space-button">🔥</button>
          <button id="si-right-button">→</button>
        </div>
      </div>
    </div>

    <div id="game-over" class="hidden">
      <div class="game-over-message" id="go-title">Game Over!</div>
      <div class="game-over-score">Score: <span id="go-score">0</span></div>
      <button id="restart-button">Reiniciar</button>
      <button id="go-menu-button">Menu</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
